# TODO Move to use version in config-ci-library, this is a temporary solution until the PR is merged in the library repo.

name: "Setup Python with uv"
description: "Install uv, set up Python, and sync project dependencies"

inputs:
  python-version:
    description: "Python version to use"
    required: false
    default: "3.11"
  uv-version:
    description: "uv version to install"
    required: false
    default: "latest"
  working-directory:
    description: "Directory containing pyproject.toml / uv.lock"
    required: false
    default: "."

runs:
  using: composite
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        version: ${{ inputs.uv-version }}
        enable-cache: true

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: uv sync --all-extras
