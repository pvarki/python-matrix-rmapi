on:
    pull_request:

jobs:
  test:
    runs-on: arc-runner-set
    permissions:
      contents: write
      pull-requests: write
      checks: write
    strategy:
      matrix:
        python-version: ["3.11"] # , "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install
      - name: Do pre-commit checks (black, lint, mypy)
        run: |
          poetry run docker/pre_commit_init.sh
      - name: Test with pytest
        env:
          SYNAPSE_REGISTRATION_SECRET: "ci-test-secret"  # pragma: allowlist secret
        run: |
          poetry run py.test -v --junitxml=pytest.xml
      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v4
        if: success() || failure() # always run even if the previous step fails
        with:
          report_paths: '**/pytest*.xml'
          detailed_summary: true
          check_name: 'JUnit report (local)'

  devel_shell:
    runs-on: arc-runner-set
    steps:
    - uses: pvarki/ci@main
      with:
        dockerfile-target: devel_shell
        image-tag: matrixrmapi:devel_shell

  docker_builds:
    runs-on: arc-runner-set
    steps:
      - uses: actions/checkout@v4
      - name: Build test target
        run: docker build --target test -t matrixrmapi:test .
      - name: Build production target
        run: docker build --target production -t matrixrmapi:production .
